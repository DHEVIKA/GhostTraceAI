apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: mcp
    app.kubernetes.io/instance: signoz
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: signoz-mcp
  name: signoz-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: mcp
      app.kubernetes.io/instance: signoz
      app.kubernetes.io/name: signoz-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mcp
        app.kubernetes.io/instance: signoz
        app.kubernetes.io/name: signoz-mcp
    spec:
      containers:
      - image: signoz/signoz-mcp-server:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 5
          httpGet:
            path: /livez
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        name: mcp
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          requests:
            cpu: 500m
            memory: 1024Mi
